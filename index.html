// --- Utility ---
const fmt = (n, decimals = 2) => {
  if (n === undefined || n === null || isNaN(n)) return "0.00";
  return Number(n).toLocaleString("zh-CN", { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
};
const deepClone = (o) => JSON.parse(JSON.stringify(o));
const getCurrencySymbol = (currency) => currency === "USD" ? "$" : currency === "HKD" ? "HK$" : "¥";
const getHoldingMarketCurrency = (holding) => (holding.market === "HK" ? "HKD" : "USD");
const getHoldingPriceSymbol = (holding, account) => getCurrencySymbol(account.type === "stock" ? getHoldingMarketCurrency(holding) : account.currency);

function calcAccountValue(account, data) {
  return calcAccountDisplayValue(account, data);
}

function calcCashCNY(items, rates) {
  let total = 0;
  for (const item of items) {
    const r = item.currency === "CNY" ? 1 : item.currency === "USD" ? (rates.USD || 6.91) : (rates.HKD || 0.88);
    total += item.balance * r;
  }
  return total;
}

function getAccountLiquidCashItems(account) {
  return normalizeLiquidCashItems(account || {});
}

function getAccountLiquidCashTotal(account, rates) {
  return fromCNY(calcLiquidCashCNY(getAccountLiquidCashItems(account), rates), account.currency, rates);
}

function normalizeLoadedData(rawData) {
  const parsed = deepClone(rawData || DEFAULT_DATA);

  if (!parsed.stockPrices) parsed.stockPrices = { ...DEFAULT_DATA.stockPrices };
  if (!parsed.strategies) parsed.strategies = [...DEFAULT_DATA.strategies];
  if (!parsed.cashAccount) parsed.cashAccount = parsed.accounts?.cash ? { items: parsed.accounts.cash.items } : deepClone(DEFAULT_DATA.cashAccount);
  if (!parsed.history) parsed.history = [...DEFAULT_DATA.history];

  if (parsed.accounts?.cash) delete parsed.accounts.cash;
  parsed.accounts = migrateAccountsData(parsed.accounts || DEFAULT_DATA.accounts);

  return parsed;
}

function getStockQuoteTargets(data) {
  const usMap = new Map();
  const hkMap = new Map();

  Object.values(data.accounts).forEach((account) => {
    if (account.type !== "stock") return;
    account.holdings.forEach((holding) => {
      const key = getHoldingPriceKey(holding);
      if (holding.market === "HK") hkMap.set(key, holding);
      else usMap.set(key, holding);
    });
  });

  return {
    us: [...usMap.values()],
    hk: [...hkMap.values()],
  };
}

// --- API ---
async function fetchExchangeRates() {
  try {
    const res = await fetch("https://open.er-api.com/v6/latest/USD");
    if (!res.ok) throw new Error();
    const j = await res.json();
    const cny = j.rates?.CNY, hkd = j.rates?.HKD;
    if (cny && hkd) return { USD: cny, HKD: cny / hkd };
  } catch (e) { console.warn("Exchange rate fetch failed:", e); }
  return null;
}

const ITICK_API_TOKEN = "12740f2466064833a52dacb3f4608fabb5c19489198647c28944474866582acf"; // ← 注册 iTick 免费版后填入 Token

async function fetchUSStockPrices(holdings) {
  const prices = {};
  if (holdings.length === 0) return prices;
  if (!FINNHUB_API_KEY || FINNHUB_API_KEY === "YOUR_FINNHUB_API_KEY") {
    console.warn("请先设置 Finnhub API Key");
    return prices;
  }

  await Promise.all(holdings.map(async (holding) => {
    try {
      const symbol = normalizeStockCode(holding.code, "US");
      const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${FINNHUB_API_KEY}`);
      if (!res.ok) throw new Error();
      const j = await res.json();
      if (j.c && j.c > 0) prices[getHoldingPriceKey(holding)] = j.c;
    } catch (e) { console.warn(`US stock fetch failed: ${holding.code}`, e); }
  }));

  return prices;
}

async function fetchHKStockPrices(holdings) {
  const prices = {};
  if (holdings.length === 0) return prices;
  if (!ITICK_API_TOKEN) {
    console.warn("请先设置 iTick Token");
    return prices;
  }

  try {
    const codes = holdings.map((holding) => normalizeStockCode(holding.code, "HK")).join(",");
    const res = await fetch(`https://api.itick.org/stock/quotes?region=HK&codes=${codes}`, {
      headers: {
        accept: "application/json",
        token: ITICK_API_TOKEN,
      },
    });
    if (!res.ok) throw new Error();
    const json = await res.json();
    if (json.code !== 0 || !json.data) throw new Error(json.msg || "Invalid iTick response");

    holdings.forEach((holding) => {
      const normalizedCode = normalizeStockCode(holding.code, "HK");
      const quote = json.data?.[normalizedCode];
      if (quote?.ld && quote.ld > 0) prices[getHoldingPriceKey(holding)] = quote.ld;
    });
  } catch (e) {
    console.warn("HK stock fetch failed:", e);
  }

  return prices;
}

// --- Overview Page ---
const OverviewPage = ({ data, showTotal, setData }) => {
  const rates = data.exchangeRates;
  const quoteTargets = useMemo(() => getStockQuoteTargets(data), [data]);
  const allQuoteTargets = useMemo(() => [...quoteTargets.us, ...quoteTargets.hk], [quoteTargets]);
  const [editingStrategy, setEditingStrategy] = useState(false);
  const [drafts, setDrafts] = useState([]);

  const { categories, toujiValue } = useMemo(() => {
    const acctEntries = Object.entries(data.accounts);
    let toujiVal = 0;
    const cats = [];
    acctEntries.forEach(([key, a]) => {
      const val = toCNY(calcAccountValue(a, data), a.currency, rates);
      if (key === "touji") { toujiVal = val; return; }
      cats.push({ name: a.name, value: val });
    });
    const cashVal = calcCashCNY(data.cashAccount.items, rates);
    cats.push({ name: "独立现金", value: cashVal });
    const total = cats.reduce((s, c) => s + c.value, 0);
    const colors = ["#e76f51", "#f4a261", "#e9c46a", "#2a9d8f", "#264653", "#6a4c93", "#1982c4", "#8ac926"];
    return {
      categories: cats.map((c, i) => ({ ...c, color: colors[i % colors.length], pct: total > 0 ? c.value / total : 0, total })),
      toujiValue: toujiVal,
    };
  }, [data, rates]);

  const startEditStrategy = () => { setDrafts([...(data.strategies || [])]); setEditingStrategy(true); };
  const saveStrategies = () => {
    setData(d => ({ ...d, strategies: drafts.filter(s => s.trim()) }));
    setEditingStrategy(false);
  };

  return (
    <div style={{ padding: "16px 16px 100px" }}>
      <Card title="资产分布">
        <div style={{ display: "flex", height: 12, borderRadius: 6, overflow: "hidden", marginBottom: 16 }}>
          {categories.map((c, i) => (
            <div key={i} style={{ width: `${(c.pct * 100).toFixed(1)}%`, background: c.color, transition: "width 0.5s ease" }} />
          ))}
        </div>
        {categories.map((c, i) => (
          <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: i < categories.length - 1 ? "1px solid #f8f8f8" : "none" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ width: 10, height: 10, borderRadius: 3, background: c.color }} />
              <span style={{ fontSize: 14, color: "#333" }}>{c.name}</span>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 14, fontWeight: 600, fontFamily: "'SF Mono', monospace", color: "#1a1a2e" }}>
                {showTotal ? `¥${fmt(c.value)}` : "••••"}
              </div>
              <div style={{ fontSize: 11, color: "#999" }}>{(c.pct * 100).toFixed(1)}%</div>
            </div>
          </div>
        ))}
      </Card>

      {data.accounts.touji && (
        <Card title="投机账户" extra="不计入总资产">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ width: 10, height: 10, borderRadius: 3, background: "#9b2226" }} />
              <span style={{ fontSize: 14, color: "#666" }}>{data.accounts.touji.name}</span>
            </div>
            <div style={{ fontSize: 15, fontWeight: 600, fontFamily: "'SF Mono', monospace", color: "#9b2226" }}>
              {showTotal ? `¥${fmt(toujiValue)}` : "••••"}
            </div>
          </div>
        </Card>
      )}

      <Card title="实时汇率" extra="自动获取">
        <div style={{ display: "flex", gap: 12 }}>
          {[["USD/CNY", rates.USD, 4], ["HKD/CNY", rates.HKD, 7]].map(([label, val, dec]) => (
            <div key={label} style={{ flex: 1, background: "#f8f9fa", borderRadius: 12, padding: 12, textAlign: "center" }}>

              <div style={{ fontSize: 18, fontWeight: 700, color: "#0f3460", fontFamily: "'SF Mono', monospace" }}>{fmt(val, dec)}</div>
            </div>
          ))}

      </Card>

      {allQuoteTargets.length > 0 && (
        <Card title="股票实时报价" extra="自动获取">
          <div style={{ display: "grid", gridTemplateColumns: `repeat(${Math.min(allQuoteTargets.length, 3)}, 1fr)`, gap: 8 }}>

      <Card title="投资策略备忘" headerRight={
        !editingStrategy ? (
          <button onClick={startEditStrategy} style={{ background: "none", border: "none", fontSize: 12, color: "#0f3460", cursor: "pointer", fontWeight: 600 }}>编辑</button>

            {(data.strategies || []).map((s, i) => (

        ) : (
          <div>
            {drafts.map((s, i) => (
              <div key={i} style={{ display: "flex", gap: 8, marginBottom: 8, alignItems: "center" }}>
                <input value={s} onChange={e => { const nd = [...drafts]; nd[i] = e.target.value; setDrafts(nd); }}
                  style={{ ...inputStyle, fontSize: 13, padding: "8px 10px" }} placeholder="输入策略..." />
                <button onClick={() => setDrafts(drafts.filter((_, j) => j !== i))} style={dangerBtnStyle}>✕</button>
              </div>
            ))}

              width: "100%", padding: 10, border: "1.5px dashed #ccc", borderRadius: 10,
              background: "transparent", color: "#999", fontSize: 13, cursor: "pointer",
            }}>+ 添加策略</button>
          </div>
        )}
      </Card>
    </div>
  );
};

const AccountsPage = ({ data, showTotal }) => {
  const rates = data.exchangeRates;
  const [expandedAcct, setExpandedAcct] = useState(null);

  const acctEntries = Object.entries(data.accounts);

  return (
    <div style={{ padding: "16px 16px 100px" }}>
      {acctEntries.map(([key, account]) => {
        const isExpanded = expandedAcct === key;
        const totalOrig = calcAccountValue(account, data);
        const totalCNYVal = toCNY(totalOrig, account.currency, rates);
        const sym = getCurrencySymbol(account.currency);
        const liquidCashItems = getAccountLiquidCashItems(account);
        const liquidCashTotal = getAccountLiquidCashTotal(account, rates);
        const holdingRatios = getAccountHoldingRatios(account, data);

        return (
          <Card key={key} title={account.name} extra={account.platform}>
            <div onClick={() => setExpandedAcct(isExpanded ? null : key)} style={{ cursor: "pointer" }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                <span style={{ fontSize: 12, color: "#999" }}>总市值 ({account.currency})</span>
                <span style={{ fontSize: 16, fontWeight: 700, color: "#0f3460", fontFamily: "'SF Mono', monospace" }}>
                  {showTotal ? `${sym}${fmt(totalOrig)}` : "••••"}
                </span>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                <span style={{ fontSize: 11, color: "#bbb" }}>折合 CNY</span>
                <span style={{ fontSize: 13, color: "#666", fontFamily: "'SF Mono', monospace" }}>
                  {showTotal ? `¥${fmt(totalCNYVal)}` : "••••"}
                </span>
              </div>
              <div style={{ textAlign: "center", fontSize: 10, color: "#ccc", paddingTop: 4 }}>{isExpanded ? "▲ 收起" : "▼ 展开详情"}</div>
            </div>
            {isExpanded && (
              <div style={{ marginTop: 8, borderTop: "1px solid #f0f0f0", paddingTop: 8 }}>
                {account.holdings.map((h, i) => {
                  const price = account.type === "stock" ? getHoldingPrice(data, h) : 0;
                  const mv = account.type === "fund" ? (h.marketValue || 0) : (h.shares || 0) * price;
                  const cash = h.cashPosition || 0;
                  const holdingSym = getHoldingPriceSymbol(h, account);
                  return (
                    <div key={i} style={{ padding: "8px 0", borderBottom: "1px solid #f8f8f8" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                        <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
                          <span style={{ fontSize: 14, fontWeight: 600 }}>{h.code}{account.type === "stock" ? ` · ${h.market}` : ""}</span>
                          <span style={{ fontSize: 11, color: "#999" }}>{showTotal ? `${fmt((holdingRatios[i] || 0) * 100, 1)}%` : "••"}</span>
                        </div>
                        <span style={{ fontSize: 14, fontWeight: 600, fontFamily: "'SF Mono', monospace" }}>
                          {showTotal ? `${holdingSym}${fmt(mv)}` : "••••"}
                        </span>
                      </div>
                      {account.type === "stock" && (
                        <div style={{ fontSize: 11, color: "#999", display: "flex", justifyContent: "space-between" }}>
                          <span>持仓: {h.shares}股 × {holdingSym}{fmt(price)}</span>
                          {cash > 0 && <span style={{ color: "#bbb" }}>现金仓位备忘: {sym}{fmt(cash)}</span>}
                        </div>
                      )}
                    </div>
                  );
                })}
                <div style={{ padding: "10px 0 4px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: liquidCashItems.length > 0 ? 8 : 0 }}>
                    <span style={{ fontSize: 13, fontWeight: 500, color: "#2a9d8f" }}>💰 流动现金</span>
                    <span style={{ fontSize: 14, fontWeight: 600, color: "#2a9d8f", fontFamily: "'SF Mono', monospace" }}>
                      {showTotal ? `${sym}${fmt(liquidCashTotal)}` : "••••"}
                    </span>
                  </div>
                  {liquidCashItems.length > 0 ? liquidCashItems.map((item, i) => {
                    const itemSym = getCurrencySymbol(item.currency);
                    const itemCny = toCNY(item.balance, item.currency, rates);
                    return (
                      <div key={`${item.currency}-${i}`} style={{
                        display: "flex", justifyContent: "space-between", alignItems: "center",
                        padding: "8px 0", borderTop: "1px solid #f8f8f8",
                      }}>
                        <div>
                          <div style={{ fontSize: 13, fontWeight: 500, color: "#1a1a2e" }}>{item.currency}</div>
                          <div style={{ fontSize: 11, color: "#aaa" }}>≈ ¥{showTotal ? fmt(itemCny) : "••••"}</div>
                        </div>
                        <div style={{ fontSize: 14, fontWeight: 600, color: "#2a9d8f", fontFamily: "'SF Mono', monospace" }}>
                          {showTotal ? `${itemSym}${fmt(item.balance)}` : "••••"}
                        </div>
                      </div>
                    );
                  }) : (
                    <div style={{ fontSize: 12, color: "#bbb", paddingTop: 4 }}>暂无流动现金</div>
                  )}
                </div>
              </div>
            )}
          </Card>
        );
      })}

      {/* Cash account */}
      <Card title="现金账户" extra="多币种">
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
          <span style={{ fontSize: 12, color: "#999" }}>折合 CNY</span>
          <span style={{ fontSize: 16, fontWeight: 700, color: "#2a9d8f", fontFamily: "'SF Mono', monospace" }}>
            {showTotal ? `¥${fmt(calcCashCNY(data.cashAccount.items, rates))}` : "••••"}
          </span>
        </div>
        {data.cashAccount.items.map((item, i) => {
          const sym = item.currency === "USD" ? "$" : item.currency === "HKD" ? "HK$" : "¥";
          const r = item.currency === "CNY" ? 1 : item.currency === "USD" ? rates.USD : rates.HKD;
          return (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid #f8f8f8" }}>
              <div>
                <div style={{ fontSize: 13, fontWeight: 500 }}>{item.name}</div>
                <div style={{ fontSize: 11, color: "#aaa" }}>{item.currency}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 14, fontWeight: 600, fontFamily: "'SF Mono', monospace" }}>{showTotal ? `${sym}${fmt(item.balance)}` : "••••"}</div>
                <div style={{ fontSize: 11, color: "#999" }}>{showTotal ? `≈ ¥${fmt(item.balance * r)}` : ""}</div>
              </div>
            </div>
          );
        })}
      </Card>
    </div>
  );
};

// --- Edit Page ---
const EditPage = ({ data, setData }) => {
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(null); // { type, acctKey?, idx? }
  const [addingHolding, setAddingHolding] = useState(null); // acctKey
  const [newHolding, setNewHolding] = useState({ code: "", market: "US", shares: 0, cashPosition: 0, marketValue: 0 });
  const [editingAcct, setEditingAcct] = useState(null); // acctKey
  const [acctDraft, setAcctDraft] = useState({ name: "", platform: "" });
  const [addingAccount, setAddingAccount] = useState(false);
  const [newAccount, setNewAccount] = useState({ name: "", platform: "", currency: "USD", type: "stock" });

  const updateAccountMeta = (acctKey) => {
    if (!acctDraft.name.trim()) return;
    setData(d => {
      const nd = deepClone(d);
      nd.accounts[acctKey].name = acctDraft.name.trim();
      nd.accounts[acctKey].platform = acctDraft.platform.trim();
      return nd;
    });
    setEditingAcct(null);
  };

  const addAccount = () => {
    if (!newAccount.name.trim()) return;
    setData(d => {
      const nd = deepClone(d);
      // Generate a unique key
      const baseKey = "acct" + Date.now();
      nd.accounts[baseKey] = {
        name: newAccount.name.trim(),
        platform: newAccount.platform.trim(),
        currency: newAccount.currency,
        type: newAccount.type,
        liquidCashItems: [],
        holdings: [],
      };
      return nd;
    });
    setAddingAccount(false);
    setNewAccount({ name: "", platform: "", currency: "USD", type: "stock" });
  };

  const updateHolding = (acctKey, idx, field, val) => {
    setData(d => {
      const nd = deepClone(d);
      const account = nd.accounts[acctKey];
      const holding = account.holdings[idx];

      if (account.type === "stock" && field === "market") {
        holding.market = val;
        holding.code = normalizeStockCode(holding.code, val);
      } else if (account.type === "stock" && field === "code") {
        holding.code = normalizeStockCode(val, holding.market || "US");
      } else {
        holding[field] = ["shares", "cashPosition", "marketValue"].includes(field)
          ? (parseFloat(val) || 0)
          : val;
      }
      return nd;
    });
  };

  const deleteHolding = (acctKey, idx) => {
    setData(d => {
      const nd = deepClone(d);
      nd.accounts[acctKey].holdings.splice(idx, 1);
      return nd;
    });
    setConfirmDelete(null);
  };

  const updateLiquidCashItem = (acctKey, idx, field, val) => {
    setData(d => {
      const nd = deepClone(d);
      nd.accounts[acctKey].liquidCashItems[idx][field] = field === "balance" ? (parseFloat(val) || 0) : val;
      return nd;
    });
  };

  const addLiquidCashItem = (acctKey) => {
    setData(d => {
      const nd = deepClone(d);
      const account = nd.accounts[acctKey];
      if (!Array.isArray(account.liquidCashItems)) account.liquidCashItems = [];
      account.liquidCashItems.push(makeLiquidCashItem(account.currency));
      return nd;
    });
  };

  const deleteLiquidCashItem = (acctKey, idx) => {
    setData(d => {
      const nd = deepClone(d);
      nd.accounts[acctKey].liquidCashItems.splice(idx, 1);
      return nd;
    });
  };

  const addHolding = (acctKey) => {
    if (!newHolding.code.trim()) return;
    setData(d => {
      const nd = deepClone(d);
      const acct = nd.accounts[acctKey];
      if (acct.type === "stock") {
        acct.holdings.push({
          code: normalizeStockCode(newHolding.code, newHolding.market),
          market: newHolding.market,
          shares: newHolding.shares || 0,
          cashPosition: newHolding.cashPosition || 0,
          group: "",
        });
      } else {
        acct.holdings.push({ code: newHolding.code.trim(), marketValue: newHolding.marketValue || 0, group: "" });
      }
      return nd;
    });
    setAddingHolding(null);
    setNewHolding({ code: "", market: "US", shares: 0, cashPosition: 0, marketValue: 0 });
  };

  const deleteAccount = (acctKey) => {
    setData(d => {
      const nd = deepClone(d);
      delete nd.accounts[acctKey];
      return nd;
    });
    setConfirmDelete(null);
  };

  const [addingCash, setAddingCash] = useState(false);
  const [newCashItem, setNewCashItem] = useState({ name: "", currency: "CNY", balance: 0 });

  const updateCashField = (idx, field, val) => {
    setData(d => {
      const nd = deepClone(d);
      nd.cashAccount.items[idx][field] = field === "balance" ? (parseFloat(val) || 0) : val;
      return nd;
    });
  };

  const deleteCashItem = (idx) => {
    setData(d => {
      const nd = deepClone(d);
      nd.cashAccount.items.splice(idx, 1);
      return nd;
    });
    setConfirmDelete(null);
  };

  const addCashItem = () => {
    if (!newCashItem.name.trim()) return;
    setData(d => {
      const nd = deepClone(d);
      nd.cashAccount.items.push({ name: newCashItem.name.trim(), currency: newCashItem.currency, balance: newCashItem.balance || 0 });
      return nd;
    });
    setAddingCash(false);
    setNewCashItem({ name: "", currency: "CNY", balance: 0 });
  };

  const handleSave = () => {
    setSaving(true);
    setTimeout(() => { setSaving(false); setSaved(true); setTimeout(() => setSaved(false), 2000); }, 500);
  };

  const handleSnapshot = () => {
    const rates = data.exchangeRates;
    let total = calcCashCNY(data.cashAccount.items, rates);
    Object.values(data.accounts).forEach(a => { total += toCNY(calcAccountValue(a, data), a.currency, rates); });
    const now = new Date();
    const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
    // Simplified snapshot - store total and per-category
    const entry = { date: dateStr, total: +total.toFixed(2) };
    // Also store individual account values for the table
    Object.entries(data.accounts).forEach(([k, a]) => {
      entry[k] = +(toCNY(calcAccountValue(a, data), a.currency, rates)).toFixed(2);
    });
    entry.cash = +(calcCashCNY(data.cashAccount.items, rates)).toFixed(2);
    setData(d => {
      const newH = [...d.history];
      const idx = newH.findIndex(h => h.date === dateStr);
      if (idx >= 0) newH[idx] = entry; else newH.push(entry);
      return { ...d, history: newH };
    });
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  const acctEntries = Object.entries(data.accounts);

  return (
    <div style={{ padding: "16px 16px 120px" }}>
      <div style={{ background: "#e8f5e9", borderRadius: 12, padding: 12, marginBottom: 8, fontSize: 13, color: "#2e7d32", display: "flex", alignItems: "center", gap: 8 }}>
        <span style={{ fontSize: 16 }}>✅</span><span>汇率和股票价格已自动获取，无需手动更新</span>
      </div>
      <div style={{ background: "#fff8e1", borderRadius: 12, padding: 12, marginBottom: 16, fontSize: 13, color: "#f57f17", display: "flex", alignItems: "center", gap: 8 }}>
        <span style={{ fontSize: 16 }}>💡</span><span>需手动更新：持仓股数、基金市值、流动现金、现金账户余额</span>
      </div>

      {acctEntries.map(([acctKey, account]) => {
        const liquidCashItems = getAccountLiquidCashItems(account);

        return (
          <Card key={acctKey} title={account.name} extra={account.platform}
            headerRight={
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={() => { setEditingAcct(acctKey); setAcctDraft({ name: account.name, platform: account.platform || "" }); }}
                  style={{ background: "none", border: "none", fontSize: 14, color: "#0f3460", cursor: "pointer", padding: "0 4px" }}>✏️</button>
                <button onClick={() => setConfirmDelete({ type: "account", acctKey })}
                  style={{ ...dangerBtnStyle, fontSize: 16, padding: "0 4px", lineHeight: 1 }}>🗑</button>
              </div>
            }
          >
          {/* Account name/platform edit form */}
          {editingAcct === acctKey && (
            <div style={{ background: "#f8f9fa", borderRadius: 12, padding: 12, marginBottom: 12 }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
                <div>
                  <label style={labelStyle}>账户名称</label>
                  <input value={acctDraft.name} onChange={e => setAcctDraft({ ...acctDraft, name: e.target.value })}
                    style={{ ...inputStyle, fontSize: 13 }} />
                </div>
                <div>
                  <label style={labelStyle}>平台</label>
                  <input value={acctDraft.platform} onChange={e => setAcctDraft({ ...acctDraft, platform: e.target.value })}
                    placeholder="如 嘉信、汇丰" style={{ ...inputStyle, fontSize: 13 }} />
                </div>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => setEditingAcct(null)}
                  style={{ flex: 1, padding: 8, border: "1px solid #ddd", borderRadius: 8, background: "#fff", fontSize: 13, cursor: "pointer", color: "#666" }}>取消</button>
                <button onClick={() => updateAccountMeta(acctKey)}

              </div>
            </div>
          )}
          {account.holdings.map((h, i) => {
            const price = account.type === "stock" ? getHoldingPrice(data, h) : 0;
            const priceSym = getHoldingPriceSymbol(h, account);
            return (
              <div key={i} style={{ marginBottom: 12, padding: "8px 0", borderBottom: "1px solid #f5f5f5" }}>

                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ fontSize: 14, fontWeight: 600, color: "#1a1a2e" }}>{h.code}{account.type === "stock" ? ` · ${h.market}` : ""}</span>
                    {account.type === "stock" && (

                  <button onClick={() => setConfirmDelete({ type: "holding", acctKey, idx: i })}

                </div>
                {account.type === "stock" ? (
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                    <div>
                      <label style={labelStyle}>市场</label>
                      <select value={h.market || "US"} onChange={e => updateHolding(acctKey, i, "market", e.target.value)}

                    <div>
                      <label style={{ ...labelStyle, color: "#bbb" }}>现金仓位（仅备忘）</label>
                      <input type="number" step="any" value={h.cashPosition} onChange={e => updateHolding(acctKey, i, "cashPosition", e.target.value)}

// --- Line Chart ---
const LineChart = ({ dataPoints, showTotal, height = 200 }) => {
  const [tooltip, setTooltip] = useState(null);
  if (!dataPoints || dataPoints.length === 0) return <div style={{ textAlign: "center", color: "#ccc", padding: 20 }}>暂无数据</div>;
  if (dataPoints.length === 1) {
    return (
      <div style={{ textAlign: "center", padding: 20 }}>
        <div style={{ fontSize: 24, fontWeight: 700, color: "#0f3460", fontFamily: "'SF Mono', monospace" }}>
          {showTotal ? `¥${fmt(dataPoints[0].total, 0)}` : "••••"}
        </div>
        <div style={{ fontSize: 11, color: "#999", marginTop: 4 }}>{dataPoints[0].date}</div>
      </div>
    );
  }

  const padX = 45, padR = 16, padTop = 20, padBot = 30;
  const width = 360;
  const chartW = width - padX - padR, chartH = height - padTop - padBot;
  const values = dataPoints.map(d => d.total);
  const minVal = Math.min(...values) * 0.95, maxVal = Math.max(...values) * 1.05;
  const range = maxVal - minVal || 1;

  const points = dataPoints.map((d, i) => ({
    x: padX + (i / (dataPoints.length - 1)) * chartW,
    y: padTop + chartH - ((d.total - minVal) / range) * chartH,
    ...d,
  }));

  const linePath = points.map((p, i) => `${i === 0 ? "M" : "L"}${p.x},${p.y}`).join(" ");
  const areaPath = linePath + ` L${points[points.length - 1].x},${padTop + chartH} L${points[0].x},${padTop + chartH} Z`;

  const yTicks = [0, 1, 2, 3].map(i => ({ val: minVal + (range * i) / 3, y: padTop + chartH - (i / 3) * chartH }));

  const xLabelIndices = [];
  if (dataPoints.length <= 6) dataPoints.forEach((_, i) => xLabelIndices.push(i));
  else {
    xLabelIndices.push(0);
    const step = Math.ceil(dataPoints.length / 5);
    for (let i = step; i < dataPoints.length - 1; i += step) xLabelIndices.push(i);
    xLabelIndices.push(dataPoints.length - 1);
  }

  return (
    <svg viewBox={`0 0 ${width} ${height}`} style={{ width: "100%", height: "auto", touchAction: "none" }}>
      {yTicks.map((t, i) => (
        <g key={i}>
          <line x1={padX} y1={t.y} x2={width - padR} y2={t.y} stroke="#f0f0f0" strokeWidth={1} />
          <text x={padX - 6} y={t.y + 3} textAnchor="end" fill="#bbb" fontSize={9} fontFamily="'SF Mono', monospace">
            {showTotal ? `${(t.val / 10000).toFixed(1)}w` : "•"}
          </text>
        </g>
      ))}
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#e9c46a" stopOpacity="0.3" />
          <stop offset="100%" stopColor="#e9c46a" stopOpacity="0.02" />
        </linearGradient>
      </defs>
      <path d={areaPath} fill="url(#areaGrad)" />
      <path d={linePath} fill="none" stroke="#e9c46a" strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round" />
      {points.map((p, i) => (
        <g key={i}>
          <circle cx={p.x} cy={p.y} r={14} fill="transparent"
            onMouseEnter={() => setTooltip(i)} onMouseLeave={() => setTooltip(null)}
            onTouchStart={e => { e.preventDefault(); setTooltip(i); }}
            onTouchEnd={() => setTimeout(() => setTooltip(null), 2000)} />
          <circle cx={p.x} cy={p.y} r={tooltip === i ? 5 : 3} fill={tooltip === i ? "#e76f51" : "#e9c46a"} stroke="#fff" strokeWidth={2} />
        </g>
      ))}
      {tooltip !== null && points[tooltip] && (
        <g>
          <line x1={points[tooltip].x} y1={padTop} x2={points[tooltip].x} y2={padTop + chartH} stroke="#e9c46a" strokeWidth={1} strokeDasharray="3,3" opacity={0.5} />
          <rect x={Math.max(2, Math.min(points[tooltip].x - 52, width - 106))} y={points[tooltip].y - 34} width={104} height={24} rx={6} fill="#1a1a2e" opacity={0.9} />
          <text x={Math.max(54, Math.min(points[tooltip].x, width - 54))} y={points[tooltip].y - 18} textAnchor="middle" fill="#fff" fontSize={10} fontFamily="'SF Mono', monospace" fontWeight="600">
            {points[tooltip].date} {showTotal ? `¥${fmt(points[tooltip].total, 0)}` : "••••"}
          </text>
        </g>
      )}
      {xLabelIndices.map(i => (
        <text key={i} x={points[i].x} y={height - 6} textAnchor="middle" fill="#999" fontSize={9}>
          {dataPoints[i].date.length > 5 ? dataPoints[i].date.slice(2) : dataPoints[i].date}
        </text>
      ))}
    </svg>
  );
};

// --- History Page ---
const HistoryPage = ({ data, showTotal }) => {
  const history = data.history || [];
  const [timeRange, setTimeRange] = useState("year");

  const filteredHistory = useMemo(() => {
    if (timeRange === "all") return history;
    const yr = new Date().getFullYear().toString();
    return history.filter(h => h.date.startsWith(yr));
  }, [history, timeRange]);

  const latestChange = useMemo(() => {
    if (filteredHistory.length < 2) return null;
    const curr = filteredHistory[filteredHistory.length - 1].total;
    const prev = filteredHistory[filteredHistory.length - 2].total;
    const diff = curr - prev;
    return { diff, pct: prev > 0 ? (diff / prev) * 100 : 0, positive: diff >= 0 };
  }, [filteredHistory]);

  const btnStyle = (active) => ({
    flex: 1, padding: "8px 0", border: "none", borderRadius: 8, fontSize: 13, fontWeight: 600,
    cursor: "pointer", background: active ? "#0f3460" : "#f0f0f0", color: active ? "#fff" : "#999",
  });

  // Dynamically get column keys from history entries (excluding date and total)
  const colKeys = useMemo(() => {
    const keys = new Set();
    history.forEach(h => Object.keys(h).forEach(k => { if (k !== "date" && k !== "total") keys.add(k); }));
    return [...keys];
  }, [history]);

  // Map keys to display names
  const acctNames = data.accounts;
  const getColName = (key) => {
    if (key === "cash") return "现金";
    if (acctNames[key]) return acctNames[key].name;
    return key;
  };

  return (
    <div style={{ padding: "16px 16px 100px" }}>
      <Card title="资产趋势">
        <div style={{ display: "flex", gap: 8, marginBottom: 16, background: "#f8f8f8", borderRadius: 10, padding: 4 }}>
          <button onClick={() => setTimeRange("year")} style={btnStyle(timeRange === "year")}>当年</button>
          <button onClick={() => setTimeRange("all")} style={btnStyle(timeRange === "all")}>有记录以来</button>
        </div>

        {latestChange && showTotal && (
          <div style={{
            display: "flex", justifyContent: "center", gap: 16, marginBottom: 12,
            padding: "8px 0", background: latestChange.positive ? "#f0faf0" : "#faf0f0", borderRadius: 10,
          }}>
            <span style={{ fontSize: 13, color: "#666" }}>月环比</span>
            <span style={{ fontSize: 14, fontWeight: 700, fontFamily: "'SF Mono', monospace", color: latestChange.positive ? "#2a9d8f" : "#e76f51" }}>
              {latestChange.positive ? "+" : ""}{fmt(latestChange.diff, 0)}
            </span>
            <span style={{ fontSize: 13, fontWeight: 600, color: latestChange.positive ? "#2a9d8f" : "#e76f51" }}>
              {latestChange.positive ? "↑" : "↓"}{Math.abs(latestChange.pct).toFixed(1)}%
            </span>
          </div>
        )}

        <LineChart dataPoints={filteredHistory} showTotal={showTotal} height={220} />
      </Card>

      <Card title="月度明细" extra={timeRange === "year" ? "当年" : "全部"}>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", fontSize: 12, borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ borderBottom: "2px solid #f0f0f0" }}>
                <th style={{ padding: "8px 4px", textAlign: "left", color: "#999", fontWeight: 500, fontSize: 11 }}>日期</th>
                {colKeys.map(k => (
                  <th key={k} style={{ padding: "8px 4px", textAlign: "right", color: "#999", fontWeight: 500, fontSize: 11, whiteSpace: "nowrap" }}>{getColName(k)}</th>
                ))}
                <th style={{ padding: "8px 4px", textAlign: "right", color: "#999", fontWeight: 500, fontSize: 11 }}>总计</th>
              </tr>
            </thead>
            <tbody>
              {filteredHistory.map((h, i) => (
                <tr key={i} style={{ borderBottom: "1px solid #f8f8f8" }}>
                  <td style={{ padding: "10px 4px", fontWeight: 500, color: "#1a1a2e", whiteSpace: "nowrap" }}>{h.date}</td>
                  {colKeys.map(k => (
                    <td key={k} style={{ padding: "10px 4px", textAlign: "right", fontFamily: "'SF Mono', monospace", color: "#666" }}>
                      {showTotal ? fmt(h[k] || 0, 0) : "••"}
                    </td>
                  ))}
                  <td style={{ padding: "10px 4px", textAlign: "right", fontWeight: 700, fontFamily: "'SF Mono', monospace", color: "#0f3460" }}>
                    {showTotal ? fmt(h.total, 0) : "••"}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
};

// --- Main App ---
function AssetManager() {
  const [data, setData] = useState(DEFAULT_DATA);
  const [activeTab, setActiveTab] = useState("overview");
  const [showTotal, setShowTotal] = useState(true);
  const [loading, setLoading] = useState(true);
  const [fetching, setFetching] = useState(false);
  const [lastFetch, setLastFetch] = useState(null);

  useEffect(() => {
    (async () => {
      try {
        const result = (() => { const v = localStorage.getItem("asset-data-v3"); return v ? { value: v } : null; })();
        if (result && result.value) {
          const parsed = normalizeLoadedData(JSON.parse(result.value));
          setData(parsed);
          if (parsed.lastFetchTime) setLastFetch(parsed.lastFetchTime);
        }
      } catch (e) {}
      setLoading(false);
    })();
  }, []);

  useEffect(() => {
    if (loading) return;
    (async () => { try { localStorage.setItem("asset-data-v3", JSON.stringify(data)); } catch (e) {} })();
  }, [data, loading]);

  const refreshMarketData = useCallback(async () => {
    setFetching(true);
    let ratesOk = false, pricesOk = false;

    const newRates = await fetchExchangeRates();
    if (newRates) { setData(d => ({ ...d, exchangeRates: newRates })); ratesOk = true; }

    const targets = getStockQuoteTargets(data);
    const hasHKHoldings = targets.hk.length > 0;
    const usPrices = await fetchUSStockPrices(targets.us);
    const hkPrices = await fetchHKStockPrices(targets.hk);
    const newPrices = { ...usPrices, ...hkPrices };
    const hkReady = !hasHKHoldings || !!ITICK_API_TOKEN;

    if (Object.keys(newPrices).length > 0) {
      setData(d => ({ ...d, stockPrices: { ...d.stockPrices, ...newPrices } }));
    }

    pricesOk = (targets.us.length === 0 || Object.keys(usPrices).length > 0 || !FINNHUB_API_KEY || FINNHUB_API_KEY === "YOUR_FINNHUB_API_KEY")
      && (targets.hk.length === 0 || Object.keys(hkPrices).length > 0 || !hkReady);

    const now = new Date();
    const timeStr = `${now.getMonth() + 1}/${now.getDate()} ${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    const noKey = FINNHUB_API_KEY === "YOUR_FINNHUB_API_KEY";
    const noItickToken = hasHKHoldings && !ITICK_API_TOKEN;
    const statusStr = noKey ? `${timeStr} (请设置 Finnhub API Key)`
      : noItickToken ? `${timeStr} (请设置 iTick Token)`
      : (ratesOk && pricesOk) ? timeStr
      : ratesOk ? `${timeStr} (股票获取失败)` : pricesOk ? `${timeStr} (汇率获取失败)` : `${timeStr} (获取失败，使用缓存)`;
    setLastFetch(statusStr);
    setData(d => ({ ...d, lastFetchTime: statusStr }));
    setFetching(false);
  }, [data]);

  useEffect(() => { if (!loading) refreshMarketData(); }, [loading]);

  const totalCNY = useMemo(() => {
    const rates = data.exchangeRates;
    let total = calcCashCNY(data.cashAccount.items, rates);
    Object.entries(data.accounts).forEach(([key, a]) => {
      if (key === "touji") return; // 投机账户不计入总资产
      total += toCNY(calcAccountValue(a, data), a.currency, rates);
    });
    return total;
  }, [data]);

  if (loading) {
    return (
      <div style={{ display: "flex", justifyContent: "center", alignItems: "center", height: "100vh", background: "#f5f5f7" }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>💰</div>
          <div style={{ color: "#999", fontSize: 14 }}>加载中...</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{
      maxWidth: 430, margin: "0 auto", minHeight: "100vh",
      background: "#f5f5f7", fontFamily: "-apple-system, 'SF Pro Text', 'PingFang SC', sans-serif",
      WebkitFontSmoothing: "antialiased",
    }}>
      <Header totalCNY={totalCNY} showTotal={showTotal} setShowTotal={setShowTotal}
        fetching={fetching} onRefresh={refreshMarketData} lastFetch={lastFetch} />

      {activeTab === "overview" && <OverviewPage data={data} showTotal={showTotal} setData={setData} />}
      {activeTab === "accounts" && <AccountsPage data={data} showTotal={showTotal} />}
      {activeTab === "edit" && <EditPage data={data} setData={setData} />}
      {activeTab === "history" && <HistoryPage data={data} showTotal={showTotal} />}

      <TabBar active={activeTab} setActive={setActiveTab} />
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(AssetManager));
  </script>
</body>
</html>
